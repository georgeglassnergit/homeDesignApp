<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Studio — Phase 2</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #d9d4cc; font-family: system-ui, sans-serif; color: #2b2622; }
      #ui { position: fixed; inset: 0; display: flex; flex-direction: column; }

      #toolbar {
        display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
        padding: 7px 10px; background: #f4efe7; border-bottom: 1px solid #cbb2a0;
        font-size: 13px; z-index: 20;
      }
      #toolbar .group { display: flex; gap: 4px; align-items: center; }
      #toolbar .sep { width: 1px; align-self: stretch; background: #d8c9b8; margin: 0 4px; }
      #toolbar b { font-family: Georgia, serif; margin-right: 8px; }
      #toolbar button, #toolbar select {
        font: inherit; padding: 5px 10px; border: 1px solid #c3ab97; border-radius: 7px;
        background: #fff; color: #2b2622; cursor: pointer;
      }
      #toolbar button:hover { background: #fbf7f0; }
      #toolbar button.active { background: #6b5b4b; color: #fff; border-color: #6b5b4b; }
      #toolbar button:disabled { opacity: .4; cursor: default; }
      #toolbar .hint { color: #7a6c5d; margin-left: auto; }

      #main { flex: 1; display: flex; min-height: 0; }
      #plan-panel {
        width: 42%; min-width: 260px; position: relative;
        border-right: 1px solid #cbb2a0; background: #efe9df;
      }
      #plan { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
      #plan-label { position: absolute; left: 10px; top: 8px; font-size: 11px; color: #8a7c6c; pointer-events: none; }
      #app { flex: 1; position: relative; min-width: 0; }
      #hud {
        position: absolute; right: 12px; top: 12px; z-index: 10;
        background: rgba(255,255,255,.82); backdrop-filter: blur(4px);
        border: 1px solid #cbb; border-radius: 10px; padding: 9px 12px;
        font-size: 12px; line-height: 1.5; max-width: 250px;
      }
      #hud b { font-family: Georgia, serif; }
      #hud .ok { color: #2e7d32; } #hud .err { color: #c62828; } #hud .muted { color: #8a7c6c; }

      /* Selection inspector — the Simple/Pro seam made visible. Read-only measurements in
         Simple; exact-entry inputs (parsed via units.js) in Pro. */
      #inspector {
        position: absolute; left: 12px; top: 12px; z-index: 10;
        background: rgba(255,255,255,.9); backdrop-filter: blur(4px);
        border: 1px solid #cbb; border-radius: 10px; padding: 10px 12px;
        font-size: 12px; line-height: 1.5; width: 190px;
      }
      #inspector.editable { border-color: #6b5b4b; }
      #inspector .ins-title { font-family: Georgia, serif; font-weight: 700; font-size: 14px; margin-bottom: 6px; }
      #inspector .ins-empty { color: #8a7c6c; }
      #inspector .ins-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 3px 0; }
      #inspector .ins-row span { color: #7a6c5d; }
      #inspector .ins-row b { font-variant-numeric: tabular-nums; }
      #inspector .ins-field {
        font: inherit; width: 92px; padding: 3px 6px; text-align: right;
        border: 1px solid #c3ab97; border-radius: 6px; background: #fff; color: #2b2622;
        font-variant-numeric: tabular-nums;
      }
      #inspector .ins-field:focus { outline: 2px solid #c9a; border-color: #6b5b4b; }
      #inspector .ins-hint { color: #8a7c6c; font-size: 10.5px; margin-top: 7px; line-height: 1.35; }
      #inspector .ins-msg { color: #c62828; font-size: 11px; margin-top: 4px; min-height: 1px; }

      /* Pro-only snapping/constraint settings (the tier-table row). Hidden in Simple.
         Anchored bottom-left so it clears the inspector (top-left) and HUD (top-right). */
      #snapping {
        position: absolute; left: 12px; bottom: 12px; z-index: 10; width: 190px;
        background: rgba(255,255,255,.92); backdrop-filter: blur(4px);
        border: 1px solid #6b5b4b; border-radius: 10px;
        padding: 10px 12px; font-size: 12px;
      }
      #snapping .snap-title { font-family: Georgia, serif; font-weight: 700; font-size: 13px; margin-bottom: 7px; }
      #snapping .snap-tag {
        font-family: system-ui, sans-serif; font-size: 9.5px; font-weight: 600; letter-spacing: .04em;
        background: #6b5b4b; color: #fff; border-radius: 3px; padding: 1px 5px; margin-left: 4px; vertical-align: 1px;
      }
      #snapping .snap-row { display: flex; align-items: center; gap: 6px; margin: 5px 0; }
      #snapping .snap-row select { margin-left: auto; padding: 2px 4px; border: 1px solid #cdbbab; border-radius: 4px; }
      #snapping .snap-hint { color: #8a7c6c; font-size: 10.5px; margin-top: 7px; line-height: 1.35; }

      /* S4 start-screen template picker — a full-panel overlay shown on boot and
         reopenable from the toolbar. Picking a card instantiates a starter Project. */
      #picker {
        position: fixed; inset: 0; z-index: 40; display: none;
        align-items: center; justify-content: center;
        background: rgba(43, 38, 34, .55); backdrop-filter: blur(3px);
      }
      #picker.open { display: flex; }
      #picker-card {
        background: #f4efe7; border: 1px solid #cbb2a0; border-radius: 14px;
        box-shadow: 0 18px 50px rgba(43,38,34,.35);
        padding: 22px 24px; width: min(680px, 92vw); max-height: 88vh; overflow: auto;
      }
      #picker h2 { font-family: Georgia, serif; margin: 0 0 2px; font-size: 21px; }
      #picker .sub { color: #7a6c5d; font-size: 13px; margin: 0 0 16px; }
      #picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .tpl-card {
        text-align: left; font: inherit; color: #2b2622; cursor: pointer;
        background: #fff; border: 1px solid #c3ab97; border-radius: 11px;
        padding: 10px; display: flex; flex-direction: column; gap: 7px;
      }
      .tpl-card:hover { border-color: #6b5b4b; box-shadow: 0 3px 12px rgba(43,38,34,.14); }
      .tpl-card:disabled { opacity: .5; cursor: default; box-shadow: none; }
      .tpl-card .thumb { width: 100%; aspect-ratio: 1/1; border-radius: 7px; overflow: hidden; background: #efe9df; }
      .tpl-card .thumb svg { display: block; width: 100%; height: 100%; }
      .tpl-card .name { font-weight: 600; font-size: 14px; }
      .tpl-card .desc { font-size: 11.5px; color: #7a6c5d; line-height: 1.35; }
      .tpl-card .soon { font-size: 10px; color: #a08; letter-spacing: .04em; text-transform: uppercase; }
      #picker-foot { margin-top: 16px; display: flex; align-items: center; gap: 10px; }
      #picker-close {
        font: inherit; padding: 6px 14px; border: 1px solid #c3ab97; border-radius: 8px;
        background: #fff; cursor: pointer;
      }
      #picker-close:hover { background: #fbf7f0; }
      #picker-note { color: #7a6c5d; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="ui">
      <div id="toolbar">
        <b>Home Studio</b>
        <div class="group">
          <button id="new" title="Start from a template (confirms if you have unsaved changes)">Templates…</button>
        </div>
        <div class="sep"></div>
        <div class="group" id="tools">
          <button data-tool="select" class="active" title="Select / drag a corner">Select</button>
          <button data-tool="draw-wall" title="Click corners to draw walls; Esc ends the run">Draw&nbsp;wall</button>
          <button data-tool="place-door" title="Click a wall to add a door">Door</button>
          <button data-tool="place-window" title="Click a wall to add a window">Window</button>
        </div>
        <div class="sep"></div>
        <div class="group" id="views" title="Toggle exterior massing vs. interior cutaway">
          <button data-view="exterior" class="active" title="Full exterior shell with roof">Exterior</button>
          <button data-view="cutaway" title="Hide roof + near walls to see inside">Cutaway</button>
        </div>
        <div class="sep"></div>
        <div class="group" id="cameras" title="Orbit around the home vs. walk through it">
          <button data-camera="orbit" class="active" title="Orbit / pan / zoom">Orbit</button>
          <button data-camera="walk" title="Walk through at eye level (WASD + drag to look; Esc exits)">Walk</button>
        </div>
        <div class="sep"></div>
        <div class="group">
          <button id="delete" title="Delete selection (Del)">Delete</button>
          <button id="undo" title="Undo (Ctrl+Z)">Undo</button>
          <button id="redo" title="Redo (Ctrl+Y)">Redo</button>
        </div>
        <div class="sep"></div>
        <div class="group" id="modes" title="Simple keeps it novice-friendly; Pro reveals exact-dimension entry">
          <button data-mode="simple" class="active" title="Novice-friendly toolset">Simple</button>
          <button data-mode="pro" title="Reveal exact-dimension entry">Pro</button>
        </div>
        <div class="group" id="units" title="Display units (storage stays metric)">
          <button data-units="metric" class="active" title="Metres / centimetres">m</button>
          <button data-units="imperial" title="Feet &amp; inches">ft</button>
        </div>
        <span class="hint" id="toolhint">Select a starter or draw a room</span>
      </div>
      <div id="main">
        <div id="plan-panel">
          <canvas id="plan"></canvas>
          <div id="plan-label">PLAN · top-down · 1&nbsp;m grid</div>
        </div>
        <div id="app">
          <div id="inspector"><div class="ins-empty">No selection — click a wall or opening</div></div>
          <div id="snapping" hidden>
            <div class="snap-title">Snapping <span class="snap-tag">Pro</span></div>
            <label class="snap-row"><input type="checkbox" data-snap="grid" checked> Grid
              <select data-snap="gridStep" title="Grid / length step">
                <option value="0.05">5&nbsp;cm</option>
                <option value="0.1" selected>10&nbsp;cm</option>
                <option value="0.25">25&nbsp;cm</option>
                <option value="0.5">50&nbsp;cm</option>
              </select>
            </label>
            <label class="snap-row"><input type="checkbox" data-snap="angle" checked> Angle-lock
              <select data-snap="angleStep" title="Lock drawn walls to this angle increment">
                <option value="90">90°</option>
                <option value="45" selected>45°</option>
                <option value="15">15°</option>
              </select>
            </label>
            <label class="snap-row"><input type="checkbox" data-snap="endpoint" checked> Snap to corners</label>
            <div class="snap-hint">Constrains wall drawing. Simple mode uses a fixed 10&nbsp;cm grid.</div>
          </div>
          <div id="hud"><b>Phase 2</b><div id="status">booting…</div></div>
        </div>
      </div>
    </div>
    <div id="picker" aria-modal="true" role="dialog" aria-label="Choose a template">
      <div id="picker-card">
        <h2>Start a new home</h2>
        <p class="sub">Pick a template to begin — or start blank and draw your own.</p>
        <div id="picker-grid"></div>
        <div id="picker-foot">
          <button id="picker-close">Keep current</button>
          <span id="picker-note"></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
